<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Carte de la Mini-Ferme de Nicolas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
}

#map{
height:100%;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>

// création carte
var map = L.map('map',{
maxZoom:22,
minZoom:10
});

// fond satellite
L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'Tiles © Esri',
maxZoom:22
}
).addTo(map);


// chargement KML
var runLayer = omnivore.kml('La mini-ferme de Nicolas.kml')
.on('ready', function() {

map.fitBounds(runLayer.getBounds());

runLayer.eachLayer(function(layer){

if(layer.feature && layer.feature.properties){

var name = layer.feature.properties.name || "Point";

var desc = layer.feature.properties.description || "";

layer.bindPopup("<b>"+name+"</b><br>"+desc);

}

});

})
.addTo(map);

</script>

</body>

</html>
