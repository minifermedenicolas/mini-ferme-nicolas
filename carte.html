<!DOCTYPE html>
<html>
<head>
    <title>Carte interactive de la mini-ferme de Nicolas</title>
    <meta charset="utf-8" />
    <!-- CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>

<h1>Carte interactive de la mini-ferme de Nicolas</h1>

<div id="map"></div>

<p><a href="index.html">Retour à l'accueil</a></p>

<!-- JS Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // 1️⃣ Créer la carte
    var map = L.map('map', {
        crs: L.CRS.Simple // cartes non géographiques
    });

    // 2️⃣ Dimensions de l'image
    var w = 800, h = 600; // largeur et hauteur de ton image
    var bounds = [[0,0], [h,w]];

    // 3️⃣ Ajouter l'image comme calque
    var image = L.imageOverlay('Vue de dessus globale.jpg', bounds).addTo(map);

    map.fitBounds(bounds);

    // 4️⃣ Ajouter un repère exemple
    var marker = L.marker([100, 200]).addTo(map);
    marker.bindPopup('<a href="arbre-1.html">Arbre 1</a>');
</script>

</body>
</html>
