<!DOCTYPE html>
<html>
<head>
    <title>Carte interactive de la mini-ferme</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
    </style>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.4/leaflet-omnivore.min.js"></script>
</head>
<body>

<h1>Carte interactive de la mini-ferme</h1>

<div id="map"></div>
<p><a href="index.html">Retour à l'accueil</a></p>

<script>
    // 1️⃣ Créer la carte
    var map = L.map('map').setView([0, 0], 1); // vue initiale simple

    // 2️⃣ Ajouter le fond (optionnel : image ou carte vide)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3️⃣ Charger le KML avec omnivore
    omnivore.kml('La mini-ferme de Nicolas.kml')
        .on('ready', function() {
            map.fitBounds(this.getBounds());
        })
        .addTo(map);
</script>

</body>
</html>
