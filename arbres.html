<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Les arbres de la Mini-Ferme</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#fdf8f0;
color:#333;
}

/* HEADER IDENTIQUE */

header{
background:#8dc63f;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:2em; /* même taille que animaux */
}

/* container */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* intro IDENTIQUE */

.intro{
margin-bottom:30px;
font-size:1em; /* aligné animaux */
}

/* grille */

.arbres-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

/* carte */

.arbre{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
transition:transform 0.2s;
overflow:hidden;
}

.arbre:hover{
transform:scale(1.05);
}

/* image */

.arbre img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
border:3px solid #8dc63f;
}

/* limitation PC IDENTIQUE */

@media (min-width:900px){

.arbre img{
max-width:180px;
margin:auto;
display:block;
}

}

/* TITRE carte IDENTIQUE */

.arbre h3{
margin:10px 0 5px 0;
font-size:1em; /* même échelle que animaux */
}

/* lien */

.arbre a{
text-decoration:none;
color:#333;
}

/* FOOTER IDENTIQUE */

footer{
text-align:center;
padding:20px;
font-size:1em; /* même taille texte */
}

footer a{
color:#8dc63f;
text-decoration:none;
font-weight:bold;
font-size:1em; /* même taille liens */
}

footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<header>
<h1>🌳 Les arbres de la Mini-Ferme de Nicolas</h1>
</header>

<div class="container">

<div class="intro">
<p>
Bienvenue dans l’univers des arbres de la mini-ferme.  
Découvrez les différentes catégories et cliquez pour en apprendre davantage.
</p>
</div>

<div class="arbres-grid">

<!-- RÉSINEUX -->

<a href="Résineux.html">
<div class="arbre">
<h3>🌲 Résineux</h3>
<img src="resineux.jpg" alt="Résineux">
</div>
</a>

<!-- FEUILLUS -->

<a href="Feuillus.html">
<div class="arbre">
<h3>🍃 Feuillus</h3>
<img src="feuillus.jpg" alt="Feuillus">
</div>
</a>

<!-- FRUITIERS -->

<a href="Fruitiers.html">
<div class="arbre">
<h3>🍎 Fruitiers</h3>
<img src="fruitiers.jpg" alt="Fruitiers">
</div>
</a>

<!-- ORNEMENT -->

<a href="Ornement.html">
<div class="arbre">
<h3>🌸 Arbres d’ornement</h3>
<img src="Ornement.jpg" alt="Ornement">
</div>
</a>

</div>

</div>

<footer>

<a href="index.html">← Retour à l'accueil</a> |
<a href="animaux.html">Voir les animaux 🐐</a> |
<a href="carte.html">Voir la carte 🌍</a>

</footer>

</body>
</html>
